<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darwin Notebook - Expo Go (Develop)</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

        <div class="instructions">

            <ul>
                <li>Installez l'app <strong>Expo Go</strong> (iOS/Android)</li>

            </ul>
        </div>

        <div class="footer">
